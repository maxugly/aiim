<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIIM Presence</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; color:#c9d1d9; font:14px/1.5 'SF Mono', 'Fira Code', monospace; padding:20px; }
  h1 { font-size:16px; color:#58a6ff; margin-bottom:4px; }
  h2 { font-size:13px; color:#8b949e; margin:24px 0 10px; text-transform:uppercase; letter-spacing:1px; }
  .section { margin-bottom:24px; }
  .card { margin-bottom:10px; border:1px solid #21262d; border-radius:6px; overflow:hidden; }
  .card-header { display:flex; align-items:center; padding:7px 12px; background:#161b22; cursor:pointer; user-select:none; transition:background .3s; }
  .card-header:hover { background:#1c2128; }
  .card-header .arrow { width:16px; color:#484f58; transition:transform .15s; font-size:12px; }
  .card.open .arrow { transform:rotate(90deg); }
  .card-name { font-weight:600; color:#e6edf3; margin-left:6px; }
  .card-badge { margin-left:auto; font-size:11px; padding:2px 8px; border-radius:10px; }
  .badge-idle { background:#21262d; color:#8b949e; }
  .badge-writing { background:#1a3a1a; color:#3fb950; }
  .badge-reviewing { background:#1a2a3a; color:#58a6ff; }
  .badge-thinking { background:#2a1a3a; color:#bc8cff; }
  .badge-blocked { background:#3a1a1a; color:#f85149; }
  .badge-offline { background:#21262d; color:#484f58; }
  .badge-active { background:#1a3a1a; color:#3fb950; }
  .badge-P1 { background:#1a2a3a; color:#58a6ff; }
  .badge-done { background:#1a3a1a; color:#3fb950; }
  .badge-pending { background:#21262d; color:#8b949e; }
  .badge-in_progress { background:#2a2a1a; color:#d2991d; }
  .card-body { display:none; padding:8px 12px 12px; background:#0d1117; border-top:1px solid #21262d; }
  .card.open .card-body { display:block; }
  .json { white-space:pre-wrap; font-size:12px; color:#7ee787; }
  .json .key { color:#79c0ff; }
  .json .string { color:#a5d6ff; }
  .json .null { color:#f85149; }

  /* Todo list */
  .todo { display:flex; align-items:center; padding:4px 0; font-size:12px; }
  .todo-check { width:16px; color:#484f58; margin-right:6px; }
  .todo-check.done { color:#3fb950; }
  .todo-check.progress { color:#d2991d; }
  .todo-owner { margin-left:auto; color:#484f58; font-size:11px; }
  .connections { font-size:11px; color:#8b949e; margin-top:6px; }

  .footer { margin-top:20px; font-size:11px; color:#484f58; }
  .refreshing { color:#d2991d; }
  .stale { color:#f85149; }
  .error { background:#3a1a1a; color:#f85149; padding:10px; border-radius:6px; margin-bottom:12px; }

  @keyframes pulse { 0% { border-color:#58a6ff; box-shadow:0 0 8px rgba(88,166,255,.3); } 100% { border-color:#21262d; box-shadow:none; } }
  .card.pulse { animation:pulse 1.5s ease-out; }
</style>
</head>
<body>
<h1>⚡ AIIM Presence Board</h1>
<div id="board"></div>
<div class="footer" id="footer"></div>

<script>
const POLL_MS = 5000;
const STALE_MS = 30000;
let prev = {};
let initialized = false;

function badgeClass(s) {
  const map = {idle:'badge-idle',writing:'badge-writing',reviewing:'badge-reviewing',
               thinking:'badge-thinking',blocked:'badge-blocked',offline:'badge-offline',
               active:'badge-active',P1:'badge-P1',done:'badge-done',pending:'badge-pending',
               in_progress:'badge-in_progress'};
  return map[s] || 'badge-idle';
}

function colorize(json) {
  return json.replace(/(\"(?:[^\"\\]|\\.)*\")\s*:/g, '<span class="key">$1</span>:')
             .replace(/: (\".*?\")/g, ': <span class="string">$1</span>')
             .replace(/: (null)/g, ': <span class="null">$1</span>');
}

function renderTodos(todos) {
  if (!todos || !todos.length) return '';
  let h = '';
  for (const t of todos) {
    const check = t.status === 'done' ? '\u2714' : t.status === 'in_progress' ? '\u25cf' : '\u25cb';
    const cls = t.status === 'done' ? 'done' : t.status === 'in_progress' ? 'progress' : '';
    h += '<div class="todo"><span class="todo-check ' + cls + '">' + check + '</span>';
    h += t.task;
    if (t.owner) h += '<span class="todo-owner">' + t.owner + '</span>';
    h += '</div>';
  }
  return h + '<div class="connections">todos: ' + todos.length + '</div>';
}

// Build body HTML for any card type
function cardBodyHTML(data, isEntity) {
  if (isEntity) {
    let body = '';
    if (data.state) body += '<div class="todo" style="margin-bottom:6px">state: <span class="card-badge ' + badgeClass(data.state) + '" style="margin-left:8px">' + data.state + '</span></div>';
    body += renderTodos(data.todos);
    if (data.connections && data.connections.length) {
      body += '<div class="connections">connections: ' + data.connections.join(', ') + '</div>';
    }
    return body;
  }
  return '<div class="json">' + colorize(JSON.stringify(data, null, 2)) + '</div>';
}

// Build full card HTML string (initial render only — no DOM to preserve yet)
function cardHTML(dataName, displayName, badgeText, badgeCls, bodyHtml) {
  return '<div class="card" data-name="' + dataName + '">' +
    '<div class="card-header" onclick="this.parentElement.classList.toggle(\'open\')">' +
    '<span class="arrow">\u25b6</span>' +
    '<span class="card-name">' + displayName + '</span>' +
    '<span class="card-badge ' + badgeCls + '">' + badgeText + '</span>' +
    '</div>' +
    '<div class="card-body">' + bodyHtml + '</div>' +
    '</div>';
}

// Create a card via DOM API (used during targeted updates for new agents)
function createCard(dataName, displayName, badgeText, badgeCls, bodyHtml) {
  const card = document.createElement('div');
  card.className = 'card';
  card.setAttribute('data-name', dataName);

  const header = document.createElement('div');
  header.className = 'card-header';
  header.addEventListener('click', function() {
    // User is the ONLY thing that controls open/closed state.
    // We never save, restore, or set this class programmatically.
    card.classList.toggle('open');
  });

  header.innerHTML = '<span class="arrow">\u25b6</span>' +
    '<span class="card-name">' + displayName + '</span>' +
    '<span class="card-badge ' + badgeCls + '">' + badgeText + '</span>';

  const body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = bodyHtml;

  card.appendChild(header);
  card.appendChild(body);
  return card;
}

// Update an existing card in-place — never destroys the DOM element.
// Only replaces text content inside the badge and body divs.
function refreshCard(card, badgeText, badgeCls, bodyHtml) {
  const badge = card.querySelector('.card-badge');
  if (badge) {
    badge.textContent = badgeText;
    badge.className = 'card-badge ' + badgeCls;
  }
  const body = card.querySelector('.card-body');
  if (body) body.innerHTML = bodyHtml;
}

// Sync cards in a section container: update existing, create new, remove stale.
// Does NOT touch the 'open' class — user state survives because DOM elements persist.
function syncSection(container, items, prevItems) {
  // items: [{key, displayName, badgeText, badgeCls, bodyHtml}]
  const existing = {};
  for (const c of container.querySelectorAll(':scope > .card[data-name]')) {
    existing[c.getAttribute('data-name')] = c;
  }

  const keep = new Set(items.map(function(i) { return i.key; }));

  // Remove cards for agents/entities/projects that disappeared
  for (const c of container.querySelectorAll(':scope > .card[data-name]')) {
    if (!keep.has(c.getAttribute('data-name'))) c.remove();
  }

  // Update existing cards, create new ones — in sorted order
  let after = null;
  for (const item of items) {
    let card = existing[item.key];
    const prevItem = prevItems ? prevItems[item.key] : null;

    if (card) {
      refreshCard(card, item.badgeText, item.badgeCls, item.bodyHtml);
    } else {
      card = createCard(item.key, item.displayName, item.badgeText, item.badgeCls, item.bodyHtml);
    }

    // Pulse animation on status change — visual only, no state change
    if (prevItem && prevItem.status !== item.badgeText) {
      card.classList.add('pulse');
      setTimeout(function() { card.classList.remove('pulse'); }, 1500);
    }

    // Reorder: move card to the correct sorted position
    if (card.nextSibling !== after) {
      container.insertBefore(card, after);
    }
    after = card.nextSibling;
  }
}

// ── Item builders: extract sorted key+display lists from agents data ──

function agentItems(agents) {
  return Object.entries(agents)
    .filter(function(e) { return !e[0].startsWith('_'); })
    .sort(function(a, b) { return a[0].localeCompare(b[0]); })
    .map(function(e) {
      const name = e[0], data = e[1];
      const status = (data && data.status) ? data.status : 'offline';
      return {
        key: name, displayName: name,
        badgeText: status, badgeCls: badgeClass(status),
        bodyHtml: cardBodyHTML(data, false), status: status
      };
    });
}

function entityItems(agents) {
  return Object.entries(agents._entities || {})
    .sort(function(a, b) { return a[0].localeCompare(b[0]); })
    .map(function(e) {
      const name = e[0], data = e[1];
      return {
        key: '\ud83d\udce6 ' + name, displayName: '\ud83d\udce6 ' + name,
        badgeText: data.state || '\u2014', badgeCls: badgeClass(data.state || ''),
        bodyHtml: cardBodyHTML(data, true), status: data.state || ''
      };
    });
}

function projectItems(agents) {
  return Object.entries(agents._projects || {})
    .sort(function(a, b) { return a[0].localeCompare(b[0]); })
    .map(function(e) {
      const name = e[0], data = e[1];
      return {
        key: '\ud83d\ude80 ' + name, displayName: '\ud83d\ude80 ' + name,
        badgeText: data.phase || '\u2014', badgeCls: badgeClass(data.phase || ''),
        bodyHtml: cardBodyHTML(data, false), status: data.phase || ''
      };
    });
}

// Extract previous data slice for a section (for change detection)
function prevFor(prevData, sectionKey) {
  if (sectionKey === 'agents') {
    const out = {};
    for (const [k, v] of Object.entries(prevData || {})) {
      if (!k.startsWith('_')) out[k] = v;
    }
    return out;
  }
  return (prevData && prevData[sectionKey]) ? prevData[sectionKey] : null;
}

function render(agents, age) {
  const board = document.getElementById('board');

  if (!agents || Object.keys(agents).length === 0) {
    board.innerHTML = '<div class="error">no data — .presence.json empty or unreadable</div>';
    initialized = false;
    prev = agents;
    updateFooter(age);
    return;
  }

  if (!initialized) {
    // ─── First render: build full DOM via innerHTML (nothing to preserve yet) ───
    let html = '';

    html += '<h2>Agents</h2><div class="section" data-section="agents">';
    for (const item of agentItems(agents)) {
      html += cardHTML(item.key, item.displayName, item.badgeText, item.badgeCls, item.bodyHtml);
    }
    html += '</div>';

    if (agents._entities) {
      html += '<h2>Entities</h2><div class="section" data-section="entities">';
      for (const item of entityItems(agents)) {
        html += cardHTML(item.key, item.displayName, item.badgeText, item.badgeCls, item.bodyHtml);
      }
      html += '</div>';
    }

    if (agents._projects) {
      html += '<h2>Projects</h2><div class="section" data-section="projects">';
      for (const item of projectItems(agents)) {
        html += cardHTML(item.key, item.displayName, item.badgeText, item.badgeCls, item.bodyHtml);
      }
      html += '</div>';
    }

    board.innerHTML = html;
    initialized = true;
  } else {
    // ─── Targeted update: preserve all card DOM elements ───
    const prevData = prev;

    // Agents (always present)
    const agentsSection = board.querySelector('[data-section="agents"]');
    if (agentsSection) {
      syncSection(agentsSection, agentItems(agents), prevFor(prevData, 'agents'));
    }

    // Entities (may appear/disappear between polls)
    const hasEntities = agents._entities && Object.keys(agents._entities).length > 0;
    let entitiesSection = board.querySelector('[data-section="entities"]');

    if (hasEntities) {
      if (!entitiesSection) {
        // Entities just appeared — create header + section container
        const h2 = document.createElement('h2');
        h2.textContent = 'Entities';
        const sec = document.createElement('div');
        sec.className = 'section';
        sec.setAttribute('data-section', 'entities');
        const afterAgents = board.querySelector('[data-section="agents"]');
        if (afterAgents) {
          afterAgents.insertAdjacentElement('afterend', h2);
          h2.insertAdjacentElement('afterend', sec);
        }
        entitiesSection = sec;
      }
      syncSection(entitiesSection, entityItems(agents), prevFor(prevData, '_entities'));
    } else if (entitiesSection) {
      // Entities disappeared — remove header + section
      const h2 = entitiesSection.previousElementSibling;
      if (h2 && h2.tagName === 'H2') h2.remove();
      entitiesSection.remove();
    }

    // Projects (may appear/disappear between polls)
    const hasProjects = agents._projects && Object.keys(agents._projects).length > 0;
    let projectsSection = board.querySelector('[data-section="projects"]');

    if (hasProjects) {
      if (!projectsSection) {
        // Projects just appeared — create header + section container
        const h2 = document.createElement('h2');
        h2.textContent = 'Projects';
        const sec = document.createElement('div');
        sec.className = 'section';
        sec.setAttribute('data-section', 'projects');
        const lastSection = board.querySelector('[data-section="entities"]') || board.querySelector('[data-section="agents"]');
        if (lastSection) {
          lastSection.insertAdjacentElement('afterend', h2);
          h2.insertAdjacentElement('afterend', sec);
        }
        projectsSection = sec;
      }
      syncSection(projectsSection, projectItems(agents), prevFor(prevData, '_projects'));
    } else if (projectsSection) {
      // Projects disappeared — remove header + section
      const h2 = projectsSection.previousElementSibling;
      if (h2 && h2.tagName === 'H2') h2.remove();
      projectsSection.remove();
    }
  }

  prev = agents;
  updateFooter(age);
}

function updateFooter(age) {
  const footer = document.getElementById('footer');
  const secs = Math.round(age / 1000);
  const cls = age > STALE_MS ? 'stale' : 'refreshing';
  footer.innerHTML = '<span class="' + cls + '">updated ' + secs + 's ago</span> \u00b7 auto-refresh ' + (POLL_MS/1000) + 's';
}

async function fetchPresence() {
  try {
    const t0 = Date.now();
    const res = await fetch('.presence.json?_=' + t0, {cache:'no-store'});
    if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
    const data = await res.json();
    render(data, Date.now() - t0);
  } catch(e) {
    document.getElementById('board').innerHTML = '<div class="error">fetch failed: ' + e.message + '</div>';
    initialized = false;
  }
}

fetchPresence();
setInterval(fetchPresence, POLL_MS);
</script>
</body>
</html>
